<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
body {
  margin:0;
  width:100vw;
  height:100vh;
  font-family: Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background 0.5s;
}

/* главный контейнер */
.screen {
  width:100%;
  height:100%;
  padding:40px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  color:white;
}

/* верх */
.top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.city {
  font-size:60px;
  font-weight:600;
}

.icon {
  font-size:120px;
}

/* центр */
.center {
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.temp {
  font-size:200px;
  font-weight:bold;
}

.desc {
  font-size:70px;
}

/* фоны */
.sunny { background: linear-gradient(180deg,#4facfe,#00f2fe); }
.cloudy { background: linear-gradient(180deg,#7f9bb3,#b8c6d1); }
.rainy { background: linear-gradient(180deg,#4568dc,#2b5876); }
.snowy { background: linear-gradient(180deg,#a8c0ff,#dfe9f3); color:#222; }
.stormy { background: linear-gradient(180deg,#434343,#000); }
</style>
</head>

<body>

<div class="screen sunny" id="screen">

  <div class="top">
    <div class="city">Мерке</div>
    <div class="icon" id="icon">☀️</div>
  </div>

  <div class="center">
    <div class="temp" id="temp">--°</div>
    <div class="desc" id="desc">...</div>
  </div>

</div>

<script>
async function loadWeather(){
  let res = await fetch("https://wttr.in/Merke?format=j1");
  let data = await res.json();

  let t = data.current_condition[0].temp_C;
  let d = data.current_condition[0].weatherDesc[0].value.toLowerCase();

  let text="Ясно";
  let icon="☀️";
  let cls="sunny";

  if(d.includes("thunder")){
    text="Гроза"; icon="⛈️"; cls="stormy";
  }
  else if(d.includes("snow")){
    text="Снег"; icon="❄️"; cls="snowy";
  }
  else if(d.includes("rain")){
    text="Дождь"; icon="🌧️"; cls="rainy";
  }
  else if(d.includes("cloud")){
    text="Облачно"; icon="☁️"; cls="cloudy";
  }

  document.getElementById("temp").innerText = t + "°";
  document.getElementById("desc").innerText = text;
  document.getElementById("icon").innerText = icon;

  document.getElementById("screen").className = "screen " + cls;
}

loadWeather();
setInterval(loadWeather, 600000);
</script>

</body>
</html>
